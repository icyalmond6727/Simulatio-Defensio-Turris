name: Build Simulatio Defensio Turris Releases

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build Windows EXE
      run: pyinstaller --windowed --name "SimulatioDefensioTurris_Windows" --add-data "assets;assets" main.py

    - name: Upload Windows Folder
      uses: actions/upload-artifact@v4
      with:
        name: SimulatioDefensioTurris-Windows
        path: dist/SimulatioDefensioTurris_Windows/

  build-macos:
    runs-on: macos-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build macOS APP
      run: pyinstaller --windowed --name "SimulatioDefensioTurris_macOS" --add-data "assets:assets" main.py

    - name: Upload macOS Folder
      uses: actions/upload-artifact@v4
      with:
        name: SimulatioDefensioTurris-macOS
        path: dist/